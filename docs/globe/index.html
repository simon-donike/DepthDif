<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DepthDif 3D Globe</title>
    <meta
      name="description"
      content="Standalone Cesium globe viewer for DepthDif prediction, GLORYS, and Argo overlays."
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:300,300i,400,400i,700,700i%7CRoboto+Mono:400,400i,700,700i&display=fallback"
    />
    <link rel="icon" href="../assets/branding/website_icon.png" />
    <link rel="stylesheet" href="../stylesheets/globe.css" />
    <script defer src="../javascripts/cesium-globe.js"></script>
    <script defer src="../javascripts/load-cesium-globe.js"></script>
  </head>
  <body class="standalone-globe-page">
    <main class="standalone-globe-shell">
      <div class="globe-page">
        <div class="globe-stage">
          <header class="standalone-globe-header">
            <div class="standalone-globe-header__content">
              <span class="standalone-globe-header__eyebrow">DepthDif Viewer</span>
              <h1 id="globe-page-title" class="standalone-globe-header__title">3D Global Visualization</h1>
              <p id="globe-page-description" class="standalone-globe-header__text">
                Compare the weekly prediction, the GLORYS top-band ground truth, and the observed Argo
                locations. Selected full-profile locations carry a depth graph that opens on click.
              </p>
            </div>
            <a class="standalone-globe-back-link" href="../">Back to Docs</a>
          </header>
          <div class="globe-toolbar">
            <div class="globe-toolbar__header">
              <span class="globe-toolbar__label">Settings</span>
              <button
                id="globe-toggle-toolbar"
                class="globe-toolbar__collapse-button"
                type="button"
                aria-expanded="true"
                aria-controls="globe-toolbar-content"
              >
                Hide settings
              </button>
            </div>
            <div id="globe-toolbar-content" class="globe-toolbar__content">
              <div class="globe-toolbar__group">
                <span class="globe-toolbar__label">Layers</span>
                <label class="globe-toggle">
                  <input id="globe-toggle-prediction" type="checkbox" checked />
                  <span>Prediction</span>
                </label>
                <label class="globe-toggle">
                  <input id="globe-toggle-ground-truth" type="checkbox" />
                  <span>GLORYS</span>
                </label>
                <label class="globe-toggle">
                  <input id="globe-toggle-points" type="checkbox" />
                  <span>Argo points</span>
                </label>
                <label class="globe-toggle">
                  <input id="globe-toggle-full-samples" type="checkbox" />
                  <span>Full sample locations</span>
                </label>
                <label class="globe-toggle">
                  <input id="globe-toggle-patch-splits" type="checkbox" />
                  <span>Train/val split</span>
                </label>
              </div>
              <div class="globe-toolbar__group">
                <label class="globe-range" for="globe-overlay-opacity">
                  <span class="globe-toolbar__label">Opacity</span>
                  <input id="globe-overlay-opacity" type="range" min="0.15" max="1" step="0.05" value="1" />
                </label>
                <button id="globe-toggle-spin" class="globe-reset-button" type="button" aria-pressed="false">
                  Spin Globe
                </button>
                <button id="globe-reset-camera" class="globe-reset-button" type="button">Reset View</button>
              </div>
            </div>
          </div>
          <div class="globe-legend" aria-label="Temperature color scale">
            <span class="globe-legend__title">Temperature</span>
            <div class="globe-legend__bar"></div>
            <div class="globe-legend__labels">
              <span>0°C</span>
              <span>30°C</span>
            </div>
          </div>
          <div id="depthdif-cesium-globe" class="globe-canvas" aria-label="DepthDif Cesium globe viewer"></div>
          <div id="globe-profile-popup" class="globe-profile-popup" hidden>
            <div class="globe-profile-popup__card">
              <div class="globe-profile-popup__header">
                <div>
                  <strong id="globe-profile-popup-title">Full sample</strong>
                  <div id="globe-profile-popup-subtitle" class="globe-profile-popup__subtitle"></div>
                </div>
                <button id="globe-profile-popup-close" class="globe-reset-button" type="button">Close</button>
              </div>
              <img id="globe-profile-popup-image" class="globe-profile-popup__image" alt="" />
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
