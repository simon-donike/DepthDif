<!doctype html>
<html lang="en" class="standalone-temporal-root">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DepthDif Temporal Dashboard</title>
    <meta
      name="description"
      content="Standalone DepthDif dashboard for validation-year basin depth-error summaries."
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="preconnect" href="https://cdn.plot.ly" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:300,300i,400,400i,700,700i%7CRoboto+Mono:400,400i,700,700i&display=fallback"
    />
    <link rel="icon" href="../assets/branding/website_icon.png" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../stylesheets/temporal-dashboard.css" />
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="../javascripts/temporal-dashboard.js"></script>
  </head>
  <body class="standalone-temporal-page">
    <main class="temporal-shell">
      <header class="temporal-header">
        <div>
          <span class="temporal-eyebrow">DepthDif Diagnostics</span>
          <h1>Temporal Dashboard</h1>
          <p id="temporal-run-label">Loading validation-year basin errors...</p>
        </div>
        <nav class="temporal-links" aria-label="Dashboard links">
          <a href="../">Docs</a>
          <a href="../visualizations/">Analysis</a>
          <a href="../analysis/">Spatial Dashboard</a>
          <a href="../globe/">Globe</a>
          <a href="../temporal-globe/">Temporal Globe</a>
        </nav>
      </header>

      <section class="temporal-controls" aria-label="Temporal dashboard controls">
        <label>
          <span>Dashboard</span>
          <select id="temporal-dashboard-select" aria-label="Dashboard">
            <option value="analysis">Absolute Error</option>
            <option value="temporal" selected>Temporal</option>
          </select>
        </label>
        <label>
          <span>Basin</span>
          <select id="temporal-basin-select"></select>
        </label>
        <label>
          <span>Variable</span>
          <select id="temporal-variable-select"></select>
        </label>
      </section>

      <section class="temporal-workspace">
        <article class="temporal-panel temporal-panel--map">
          <div class="temporal-panel__header">
            <div>
              <h2>Basin Map</h2>
              <p id="temporal-map-caption">Approximate validation basin selection</p>
            </div>
            <span id="temporal-selection-pill" class="temporal-pill">Global</span>
          </div>
          <div id="temporal-map" class="temporal-map" role="application" aria-label="World map of validation basins"></div>
        </article>

        <article class="temporal-panel temporal-panel--chart">
          <div class="temporal-panel__header">
            <div>
              <h2>Depth Error</h2>
              <p id="temporal-depth-caption">Mean absolute error across the 2018 validation year</p>
            </div>
          </div>
          <div id="temporal-depth-error" class="temporal-chart" role="img" aria-label="Mean absolute error by depth"></div>
        </article>
      </section>
    </main>
  </body>
</html>
