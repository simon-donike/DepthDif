# Compact Zarr source variables kept for model-facing training stores.

ostia:
  vars:
    # Sea-surface foundation temperature; units: kelvin.
    - analysed_sst
    # OSTIA categorical land/sea/ice mask used for patch filtering.
    - mask

argo:
  # Corrected profile sample depth; units: metre.
  depth_var: DEPH_CORRECTED
  vars:
    # In-situ temperature on the t90 scale; units: degree_celsius.
    - TEMP
    # Corrected practical salinity; units: 1 (unitless practical salinity).
    - PSAL_CORRECTED

glorys:
  vars:
    # Sea-water potential temperature on depth levels; units: degrees_C.
    - thetao
    # Sea-water salinity on depth levels; source units: 1e-3 / PSU.
    - so
    # Sea surface height above geoid; units: m.
    - zos

sealevel:
  vars:
    # Absolute dynamic topography; units: m.
    - adt
