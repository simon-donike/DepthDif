# Settings for instantiating latent conditional diffusion architecture/checkpoint behavior.
model: # Model Settings
  model_type: "latent_cond_dif" # Latent conditional diffusion model type.
  resume_checkpoint: false # false/null starts from scratch; set to a .ckpt path to load checkpoint state.
  load_checkpoint_only: false # true loads model weights only; false resumes optimizer/scheduler/trainer state too.
  generated_channels: 12 # Predict latent z_y channels.
  condition_channels: 15 # z_x (12) + EO (1) + collapsed x_valid_mask (1) + GLORYS land_mask (1).
  condition_mask_channels: 1 # One x_valid_mask channel is concatenated to the model condition.
  condition_include_eo: true # Include batch["eo"] as extra condition channel.
  condition_use_valid_mask: true # Use x_valid_mask as conditioning input in addition to EO + z_x.
  condition_use_land_mask: true # Concatenate GLORYS-derived spatial ocean/domain mask to the condition tensor.
  clamp_known_pixels: false # If true, inpainting-style sampling clamps known pixels each diffusion step for generation stability.
  mask_loss_with_valid_pixels: true # Uses task-valid supervision masks intersected with GLORYS land_mask.
  parameterization: "x0" # Diffusion training target: "epsilon" (noise) or "x0" (clean sample).
  log_intermediates: true # Default for validation denoising intermediate logging; training.validation_sampling.log_intermediates overrides this.
  ema:
    enabled: false # Disabled by default; set true to maintain EMA weights during training.
    decay: 0.9999 # Exponential decay for shadow weights; higher values smooth longer histories.
    apply_every_n_steps: 1 # Update EMA after every optimizer step by default.
    start_step: 0 # Delay EMA updates until this global step.
    save_ema_weights_in_callback_state: true # Store EMA state in Lightning checkpoints for resume.
    evaluate_ema_weights_instead: true # Swap EMA weights in for validation/test, then restore training weights.

  latent:
    ae_config_path: "src/depth_recon/configs/lat_space/ae_config.yaml" # Path to AE architecture/training config.
    ae_checkpoint: false # false/null disables loading pretrained AE; set to checkpoint path when available.
    freeze_autoencoder: true # Freeze AE weights during latent diffusion training.
    latent_channels: 12 # Expected latent channel count.
    spatial_downsample: 1 # 1 keeps latent at full HxW.
    eo_in_pixel_space: true # Keep EO conditioning in pixel space and concatenate directly.

  ambient_occlusion:
    enabled: false # Enables ambient x-reconstruction on x_valid_mask ∩ y_valid_mask ∩ land_mask with further-corrupted input.
    further_drop_prob: 0.1 # Additional drop probability delta applied to already observed pixels.
    apply_to_noisy_branch: true # If true, applies the further mask to the noisy target branch (~A x_t).
    shared_spatial_mask: true # If true, samples one spatial further-mask per sample and shares it across channels.
    min_kept_observed_pixels: 1 # Guarantees at least this many originally-observed pixels remain after further corruption.
    require_x0_parameterization: true # If true, ambient objective requires model.parameterization == "x0".

  post_process:
    gaussian_blur:
      enabled: false # If true, apply a small Gaussian blur to denormalized predictions at final post-process.
      sigma: 0.5 # Small blur strength (standard deviation in pixels).
      kernel_size: 3 # Odd kernel size; even values are auto-adjusted to the next odd number.

  coord_conditioning:
    enabled: true # Enable patch-center coordinate conditioning via FiLM.
    encoding: "unit_sphere" # "unit_sphere", "sincos", or "raw".
    include_date: true # If true, also encode batch["date"] (YYYYMMDD) together with coords.
    date_encoding: "day_of_year_sincos" # Current option: non-leap day-of-year sin/cos with denominator 365.
    embed_dim: null # If null, defaults to unet.dim.

  unet: # Denoiser backbone (ConvNeXt U-Net) settings.
    dim: 64 # Base channel width of U-Net.
    dim_mults: [1, 2, 4, 8] # Per-stage width multipliers; length controls U-Net depth.
    with_time_emb: true # Enable timestep embeddings in the denoiser.
    output_mean_scale: false # Optional output mean correction used by some diffusion variants.
    residual: false # If true, predicts a residual added to input.
