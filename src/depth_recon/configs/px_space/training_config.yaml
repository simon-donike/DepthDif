training:
  lr: 1.0e-4 # Optimizer learning rate.
  batch_size: 4 # Informational batch size; dataloader.batch_size remains the source of truth.
  noise:
    num_timesteps: 1000 # Number of diffusion steps.
    schedule: "cosine" # Stable default schedule for pixel-space diffusion.
    beta_start: 1.0e-4 # Noise level at the first timestep.
    beta_end: 2.0e-2 # Noise level at the final timestep.
  validation_sampling:
    sampler: "ddpm" # Use the full validation reverse chain to match the training diffusion schedule.
    ddim_num_timesteps: 100 # Validation DDIM steps when sampler="ddim".
    ddim_eta: 0.0 # Deterministic DDIM validation when sampler="ddim".
    ddim_temperature: 1.0 # DDIM noise temperature; lower values reduce generative variation.
    log_intermediates: false # Disable dense intermediate image logging by default.
    skip_full_reconstruction_in_sanity_check: true # Keep startup sanity validation lightweight.
    max_full_reconstruction_samples: 1 # Keep one full-reconstruction sample per validation run.

trainer:
  max_epochs: 1500 # Conservative upper bound; plateau scheduler handles late-stage decay.
  accelerator: "auto" # Let Lightning choose the available backend.
  devices: "auto" # Use all configured devices unless overridden from the CLI.
  num_gpus: null # Leave null so devices/accelerator stay in effect.
  strategy: "auto" # Use Lightning's default distributed strategy selection.
  precision: "16-mixed" # Mixed precision is the practical default for this heavier pixel-space setup.
  matmul_precision: "high" # Enable Tensor Core-friendly matmul precision.
  suppress_accumulate_grad_stream_mismatch_warning: true # Silence known PyTorch warning noise.
  suppress_lightning_pytree_warning: true # Silence Lightning pytree deprecation warning noise.
  ckpt_monitor: "val/loss_ckpt" # Save the best checkpoint on the validation loss used elsewhere in the repo.
  lr_logging_interval: "step" # Log LR changes at step granularity.
  log_every_n_steps: 25 # Keep console/logger cadence reasonable for long runs.
  num_sanity_val_steps: 1 # Run a minimal validation smoke test before training.
  val_check_interval: 0.1 # Run validation every 10% of the training dataloader.
  limit_val_batches: 16 # Use more cheap validation-loss batches per validation run.
  enable_model_summary: true # Show Lightning's model summary at startup.
  gradient_clip_val: 1.0 # Clip gradients to reduce occasional diffusion-training spikes.

wandb:
  project: "DepthDif_Simon" # Existing project namespace used in this repository.
  entity: "esa-phi-lab" # Existing W&B entity used in this repository.
  run_name: "ostia_argo_netcdf_px" # Default run name for the NetCDF dataset preset.
  log_model: "false" # Skip automatic checkpoint artifact uploads by default.
  verbose: true # Keep lightweight scalar/image logging enabled.
  watch_gradients: false # Disable wandb.watch gradient logging by default.
  watch_parameters: false # Disable wandb.watch parameter logging by default.
  watch_log_freq: 100 # Watch frequency if watch logging gets enabled later.
  watch_log_graph: false # Skip graph logging.
  log_stats_every_n_steps: 200 # Scalar debug logging cadence.
  log_images_every_n_steps: 200 # Qualitative image logging cadence.

dataloader:
  batch_size: 48 # Conservative batch size for 50 depth levels plus conditioning channels.
  val_batch_size: 5 # Smaller validation batch to leave room for qualitative sampling.
  num_workers: 6 # Moderate worker count for NetCDF-backed data loading.
  val_num_workers: 0 # Keep validation single-process for stability during sampling/logging.
  persistent_workers: true # Reuse train workers across epochs.
  val_persistent_workers: false # Validation workers are disabled, so persistence stays off.
  prefetch_factor: 2 # Conservative prefetch depth to avoid excess host-memory growth.
  shuffle: true # Shuffle training samples each epoch.
  val_shuffle: false # Keep validation ordering stable.
  pin_memory: true # Pin host memory for faster host-to-device transfer.

scheduler:
  warmup:
    enabled: true # Use a short warmup before plateau scheduling takes over.
    steps: 2000 # Warmup length in optimizer steps.
    start_ratio: 0.2 # Start warmup at 20% of the base LR.
  reduce_on_plateau:
    enabled: true # Decay LR automatically when validation stops improving.
    monitor: "val/loss_ckpt" # Validation loss used for plateau detection.
    interval: "step" # Count patience in optimizer steps; use "epoch" for epoch-level patience.
    mode: "min" # Lower validation loss is better.
    factor: 0.5 # Halve the LR on plateau.
    patience: 2000 # Optimizer steps with no improvement before reducing LR.
    threshold: 1.0e-4 # Minimum relative improvement to reset patience.
    threshold_mode: "rel" # Use relative thresholding.
    cooldown: 0 # Scheduler intervals to wait after an LR drop before resuming checks.
    min_lr: 1.0e-6 # Do not decay below this LR floor.
    eps: 1.0e-8 # Ignore numerically insignificant LR updates.
