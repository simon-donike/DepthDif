# Ambient-objective variant of the pixel-space diffusion model preset.
model:
  model_type: "cond_px_dif" # Pixel-space conditional diffusion.
  resume_checkpoint: false # Land-mask conditioning changes U-Net input channels; train from scratch unless using a matching checkpoint.
  load_checkpoint_only: false # No checkpoint is loaded by this preset.
  generated_channels: 50 # Predict the full 50-level GLORYS temperature stack.
  condition_channels: 53 # OSTIA (1) + corrupted Argo stack (50) + collapsed x_valid_mask (1) + GLORYS land_mask (1).
  condition_mask_channels: 1 # Collapse x_valid_mask across depth to keep conditioning lighter than a 50-channel mask.
  condition_include_eo: true # Include batch["eo"] as an extra condition channel.
  condition_use_valid_mask: true # Concatenate x_valid_mask to the condition tensor.
  condition_use_land_mask: true # Concatenate GLORYS-derived spatial ocean/domain mask to the condition tensor.
  clamp_known_pixels: false # Sampling-time clamping is optional; leave it off for the default training preset.
  mask_loss_with_valid_pixels: true # Ambient training supervises x on x_valid_mask ∩ y_valid_mask ∩ land_mask; standard mode uses y_valid_mask ∩ land_mask.
  parameterization: "x0" # Required by the ambient objective when require_x0_parameterization=true.
  log_intermediates: false # Training config can still override validation logging behavior.
  ema:
    enabled: false # Disabled by default; set true to maintain EMA weights during training.
    decay: 0.9999 # Exponential decay for shadow weights; higher values smooth longer histories.
    apply_every_n_steps: 1 # Update EMA after every optimizer step by default.
    start_step: 0 # Delay EMA updates until this global step.
    save_ema_weights_in_callback_state: true # Store EMA state in Lightning checkpoints for resume.
    evaluate_ema_weights_instead: true # Swap EMA weights in for validation/test, then restore training weights.
  ambient_occlusion:
    enabled: true # Enable ambient x-reconstruction on x_valid_mask ∩ y_valid_mask ∩ land_mask with further-corrupted input.
    further_drop_prob: 0.25 # extra corruption over already-observed Argo pixels.
    apply_to_noisy_branch: true # Applies the further-corrupted mask to the noisy target branch.
    shared_spatial_mask: true # Shares one spatial further-mask across all depth channels.
    min_kept_observed_pixels: 4 # Keep a non-trivial number of observed channel-pixels after further corruption.
    require_x0_parameterization: true # Ambient objective stays tied to x0 parameterization.
  post_process:
    gaussian_blur:
      enabled: false # Keep raw denormalized predictions without additional smoothing.
      sigma: 0.5 # Small blur strength in pixels if enabled later.
      kernel_size: 3 # Even values are auto-adjusted to the next odd number.

  coord_conditioning:
    enabled: true # Enable patch-center coordinate conditioning via FiLM.
    encoding: "unit_sphere" # Stable latitude/longitude encoding for global patches.
    include_date: true # Also encode sample date together with coordinates.
    date_encoding: "day_of_year_sincos" # Non-leap day-of-year sin/cos encoding.
    embed_dim: null # Defaults to unet.dim when left null.

  unet:
    dim: 64 # Wider base width to better match the 50-output / 53-condition channel setup. Other Common values: 48 for 16x16, 64 for 32x32, 96 for 48x48, 128 for 64x64.
    dim_mults: [1, 2, 4, 8] # Keep the established U-Net depth while reducing width.
    with_time_emb: true # Enable timestep embeddings in the denoiser.
    output_mean_scale: false # Optional output mean correction remains disabled.
    residual: false # Predict the denoised output directly instead of a residual.

# UNet Dimensionality Examples
#dim_48:
#  - 48 @ 128x128
#  - 96 @ 64x64
#  - 192 @ 32x32
#  - 384 @ 16x16

