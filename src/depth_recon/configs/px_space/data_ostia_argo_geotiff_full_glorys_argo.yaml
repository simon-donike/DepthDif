dataset:
  core:
    dataset_variant: "argo_geotiff_gridded" # Lazily reads patches from exported GeoTIFF rasters plus ARGO profile zarr.
    dataloader_type: "light" # The current training runner supports only "light" dataset loading.
    geotiff_root_dir: "/work/data/depthdif"
    metadata_cache_dir: "/work/data/depthdif/depthdif_cache"
  grid:
    tile_size: 128
    resolution_deg: 0.1
    patch_grid_source: "land_mask"
    land_mask_path: "src/depth_recon/data/dataset_creation/data_download_raw/get_world/world_land_mask_glorys_0p1.tif"
    patch_stride: 32 # 75% overlap for 128-pixel patches; centroids are spaced by 3.2 degrees.
    max_land_fraction: 0.30
    force_include_regions:
      - name: "mediterranean"
        lon_min: -6.0
        lon_max: 37.0
        lat_min: 30.0
        lat_max: 46.0
        max_land_fraction: 0.60
      - name: "baltic"
        lon_min: 9.0
        lon_max: 31.0
        lat_min: 53.0
        lat_max: 66.0
        max_land_fraction: 0.85
      - name: "red_sea"
        lon_min: 32.0
        lon_max: 44.0
        lat_min: 12.0
        lat_max: 30.0
        max_land_fraction: 0.85
      - name: "great_lakes"
        lon_min: -93.0
        lon_max: -75.0
        lat_min: 41.0
        lat_max: 49.0
        max_land_fraction: 0.95
  sampling:
    temporal_window_days: 7
    glorys_var_name: "thetao" # Full 50-level GLORYS temperature stack used as dense target y.
    ostia_var_name: "analysed_sst" # OSTIA surface SST used as dense EO condition eo.
  selection:
    require_argo_for_train: false # Train on all retained GLORYS target patches, including rows without ARGO support.
    require_argo_for_val: true # Keep only validation rows containing actual ARGO profile points.
    require_argo_for_all: false
  synthetic:
    enabled: false # Sparse input x is rasterized from actual ARGO profiles, not sampled from GLORYS y.
    pixel_count: 250 # Number of horizontal pixels copied from GLORYS y into sparse x.
  output:
    return_info: false # Keep training batches lean; enable only for debugging source metadata.
    return_coords: true # Required by the coord/date-conditioning model preset.
  runtime:
    random_seed: 7 # Seed used for deterministic dataset-side sampling.
    cache_size: 8 # Maximum open GeoTIFF files per worker.

split:
  val_year: 2018 # Rows from this calendar year are validation; all other years are training.
  val_fraction: 0.2 # Used only when val_year is null; deterministic spatial-patch validation fraction.

dataloader:
  num_workers: 6 # Fastest GeoTIFF loader setting in a 528-sample ablation on this export.
  prefetch_factor: 2 # Best paired prefetch depth for num_workers=6 in the same ablation.
  val_shuffle: true # Enable validation shuffling for the current experimentation workflow.
