dataset:
  core:
    dataset_variant: "argo_zarr_gridded" # Lazily builds patches from compact zarr stores.
    dataloader_type: "light"
    zarr_root_dir: "/data1/datasets/depth_v2/zarr_training"
    argo_zarr: null # Defaults to <zarr_root_dir>/argo.zarr.
    glorys_zarr: null # Defaults to <zarr_root_dir>/glorys.zarr.
    ostia_zarr: null # Defaults to <zarr_root_dir>/ostia.zarr.
    sealevel_zarr: null # Defaults to <zarr_root_dir>/sealevel.zarr when present.
    metadata_cache_dir: "/data1/datasets/depth_v2/depthdif_cache"
  grid:
    tile_size: 128
    resolution_deg: 0.1
    patch_grid_source: "land_mask"
    land_mask_path: "data/dataset_creation/data_download_raw/get_world/world_land_mask_glorys_0p1.tif"
    patch_stride: 64
    max_land_fraction: 0.30
    force_include_regions:
      - name: "mediterranean"
        lon_min: -6.0
        lon_max: 37.0
        lat_min: 30.0
        lat_max: 46.0
        max_land_fraction: 0.60
    invalid_threshold: 0.5
    invalid_mask_flags: ["land"]
  sampling:
    temporal_window_days: 7
    glorys_var_name: "thetao"
    glorys_salinity_var_name: "so"
    glorys_ssh_var_name: "zos"
    ostia_var_name: "analysed_sst"
    argo_temp_var_name: "TEMP"
    argo_salinity_var_name: "PSAL_CORRECTED"
    argo_depth_var_name: "DEPH_CORRECTED"
    sealevel_ssh_var_name: "adt"
  selection:
    require_argo_for_train: true
    require_argo_for_val: true
    require_argo_for_all: false
  synthetic:
    enabled: false
    pixel_count: 250
  output:
    return_info: false
    return_coords: true
    return_modalities: false # Enable to receive saved salinity/SSH modality tensors.
  runtime:
    random_seed: 7

split:
  val_year: 2018
  val_fraction: 0.2

dataloader:
  val_shuffle: true
