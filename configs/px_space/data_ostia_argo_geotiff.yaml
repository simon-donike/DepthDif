dataset:
  core:
    dataset_variant: "argo_geotiff_gridded" # Lazily reads patches from exported GeoTIFF rasters plus ARGO profile zarr.
    dataloader_type: "light" # The current training runner supports only "light" dataset loading.
    geotiff_root_dir: "/work/data/depthdif"
    metadata_cache_dir: "/work/data/depthdif/depthdif_cache"
  grid:
    tile_size: 128
    resolution_deg: 0.1
    patch_grid_source: "land_mask"
    land_mask_path: "data/dataset_creation/data_download_raw/get_world/world_land_mask_glorys_0p1.tif"
    patch_stride: 64
    max_land_fraction: 0.30
    force_include_regions:
      - name: "mediterranean"
        lon_min: -6.0
        lon_max: 37.0
        lat_min: 30.0
        lat_max: 46.0
        max_land_fraction: 0.60
  sampling:
    temporal_window_days: 7
    glorys_var_name: "thetao"
    ostia_var_name: "analysed_sst"
  selection:
    require_argo_for_train: true
    require_argo_for_val: true
    require_argo_for_all: false
  synthetic:
    enabled: false # If true, build sparse x by sampling GLORYS y instead of ARGO profiles.
    pixel_count: 250 # Number of horizontal pixels copied from GLORYS y into sparse x.
  output:
    return_info: false # Keep training batches lean; enable only for debugging source metadata.
    return_coords: true # Required by the coord/date-conditioning model preset.
  runtime:
    random_seed: 7 # Seed used for deterministic dataset-side sampling.
    cache_size: 8 # Maximum open GeoTIFF files per worker.

split:
  val_year: 2018 # Rows from this calendar year are validation; all other years are training.
  val_fraction: 0.2 # Used only when val_year is null; deterministic spatial-patch validation fraction.

dataloader:
  val_shuffle: true # Enable validation shuffling for the current experimentation workflow.
